# ╔══════════════════════════════════════════════════════════════════════╗
# ║          🚀 CI/CD 自动化流水线（真实开发场景）                        ║
# ║                                                                      ║
# ║  本文件演示正规团队常用的三种自动化场景：                              ║
# ║  ❶ PR 提交时 → 仅构建检查（不部署）                                   ║
# ║  ❷ 合并到 master → 自动部署到预览环境                                 ║
# ║  ❸ 打版本标签 v* → 自动部署到生产环境（正式发版）                      ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: CI/CD Pipeline

# ╭──────────────────────────────────────────────────────────────────────╮
# │  触发条件                                                            │
# │  ──────────────────────────────────────────────────────────────────  │
# │  同时监听三种事件，后续用 if 条件判断分别处理                            │
# ╰──────────────────────────────────────────────────────────────────────╯
on:
  pull_request:            # ❶ 有人提交 PR 时触发（代码审查阶段）
    branches: [master]

  push:
    branches: [master]     # ❷ 代码被合并到 master 后触发
    tags:
      - 'v*'               # ❸ 推送标签（如 v1.0.0）时触发，正式发版

# ╭──────────────────────────────────────────────────────────────────────╮
# │  权限配置                                                            │
# ╰──────────────────────────────────────────────────────────────────────╯
permissions:
  contents: read
  pages: write
  id-token: write

# ╭──────────────────────────────────────────────────────────────────────╮
# │  并发控制                                                            │
# │  避免多个部署任务同时运行导致冲突或状态混乱                              │
# ╰──────────────────────────────────────────────────────────────────────╯
concurrency:
  group: pages
  cancel-in-progress: false

# ╭──────────────────────────────────────────────────────────────────────╮
# │  任务定义                                                            │
# ╰──────────────────────────────────────────────────────────────────────╯
jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  构建任务（所有场景都会执行）
  #  PR 时做「质检」，push 时做「构建产物」供后续部署使用
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取仓库代码
        uses: actions/checkout@v4

      - name: 📦 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: ⬢ 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 🛠 安装项目依赖
        run: pnpm install

      - name: 🏗 构建生产版本
        run: pnpm run build

      # 🔍 构建检查：PR 场景下只做验证，不部署
      # 如果构建失败，PR 页面会显示 ❌，阻止合并
      - name: ✅ 验证构建产物
        run: |
          echo "构建成功，产物如下："
          ls -la dist

      # 📤 只有「非 PR」场景才上传构建产物（供部署使用）
      # github.event_name 是当前触发的事件名称
      - name: 📤 上传构建产物
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  部署任务（仅非 PR 场景执行）
  #  master 推送 → 预览环境 ｜ tag 推送 → 生产环境
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    needs: build            # 必须等 build 成功后才执行
    if: github.event_name != 'pull_request'   # PR 时不执行部署
    runs-on: ubuntu-latest

    # 🎯 环境名称动态判断：
    # startsWith(github.ref, 'refs/tags/v') → 判断当前是否是标签推送
    # 是 → 环境名称为 production（生产环境）
    # 否 → 环境名称为 preview（预览环境）
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'preview' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
