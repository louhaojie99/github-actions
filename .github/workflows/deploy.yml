# ╔══════════════════════════════════════════════════════════════════════╗
# ║          🚀 CD 持续部署（自动发布到 GitHub Pages）                    ║
# ║                                                                      ║
# ║  作用：代码推送到 master 或打标签时，自动构建并部署网站                ║
# ║  触发：❶ push 到 master → 预览环境  ❷ push tag v* → 生产环境         ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ╭──────────────────────────────────────────────────────────────────────╮
# │  ❶ 工作流名称                                                        │
# │  ──────────────────────────────────────────────────────────────────  │
# │  这个名字会显示在 GitHub 仓库的 Actions 标签页里                       │
# ╰──────────────────────────────────────────────────────────────────────╯
name: Deploy

# ╭──────────────────────────────────────────────────────────────────────╮
# │  ❷ 触发条件                                                          │
# │  ──────────────────────────────────────────────────────────────────  │
# │  监听 push 事件：master 分支推送 / 版本标签推送                         │
# │  注意：不包含 PR，PR 的构建检查由 ci.yml 负责                         │
# ╰──────────────────────────────────────────────────────────────────────╯
on:
  push:
    branches: [master]     # ❶ 代码被推送到 master 时触发（日常迭代部署）
    tags:
      - 'v*'               # ❷ 推送版本标签时触发（如 v1.0.0，正式发版）

# ╭──────────────────────────────────────────────────────────────────────╮
# │  ❸ 权限配置                                                          │
# │  ──────────────────────────────────────────────────────────────────  │
# │  GitHub Actions 默认没有任何权限，这里显式声明运行所需的权限             │
# ╰──────────────────────────────────────────────────────────────────────╯
permissions:
  contents: read         # 读取仓库代码（checkout 需要）
  pages: write           # 写入 GitHub Pages（部署需要）
  id-token: write        # 生成临时令牌（安全地部署到 Pages 需要）

# ╭──────────────────────────────────────────────────────────────────────╮
# │  ❹ 并发控制                                                          │
# │  ──────────────────────────────────────────────────────────────────  │
# │  防止同时触发多个部署任务导致冲突或资源浪费                              │
# ╰──────────────────────────────────────────────────────────────────────╯
concurrency:
  group: pages           # 同属于 "pages" 组的任务会排队执行
  cancel-in-progress: false   # 不取消正在运行的，等它完成

# ╭──────────────────────────────────────────────────────────────────────╮
# │  ❺ 任务定义                                                          │
# │  ──────────────────────────────────────────────────────────────────  │
# │  包含两个任务：build（构建）→ deploy（部署）串行执行                   │
# ╰──────────────────────────────────────────────────────────────────────╯
jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  构建任务
  #  拉取代码 → 安装依赖 → 构建项目 → 上传构建产物
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    runs-on: ubuntu-latest   # 在最新的 Ubuntu 云服务器上运行

    steps:
      - name: 📥 拉取仓库代码
        uses: actions/checkout@v4   # 使用官方 action 将代码下载到服务器

      - name: 📦 安装 pnpm 包管理器
        uses: pnpm/action-setup@v4  # 安装 pnpm（比 npm 更快，节省磁盘空间）
        with:
          version: 10               # 指定 pnpm 版本
          run_install: false        # 只安装 pnpm，不执行 pnpm install

      - name: ⬢ 配置 Node.js 环境
        uses: actions/setup-node@v4 # 安装指定版本的 Node.js
        with:
          node-version: 22          # 使用 Node.js 22 版本（LTS 长期支持版）
          cache: pnpm               # 缓存 pnpm 的依赖，下次构建更快

      - name: 🛠 安装项目依赖
        run: pnpm install           # 根据 package.json 安装所有依赖包

      - name: 🔍 代码检查
        run: pnpm run lint          # 运行 ESLint 检查代码规范

      - name: 🏗 构建生产版本
        run: pnpm run build         # 执行 Vite 构建，生成 dist 目录

      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v3   # 将 dist 目录打包上传到 GitHub 的临时存储
        with:
          path: dist                # 要上传的文件夹路径（Vite 默认输出到这里）

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  部署任务（必须等 build 成功后才执行）
  #  master 推送 → 预览环境 ｜ tag 推送 → 生产环境
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    needs: build            # 必须等 build 成功后才执行
    runs-on: ubuntu-latest

    # 🎯 环境名称动态判断：
    # startsWith(github.ref, 'refs/tags/v') → 判断当前是否是标签推送
    # 是 → 环境名称为 production（生产环境）
    # 否 → 环境名称为 preview（预览环境）
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'preview' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 部署到 GitHub Pages
        id: deployment                         # 给这个步骤起个 ID，方便上面引用它的输出
        uses: actions/deploy-pages@v4          # 官方 action：将上传的 artifact 正式发布到 Pages
